name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Install dependencies and check for credential leaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Gateway dependencies
        working-directory: Gateway
        run: bun install --frozen-lockfile || bun install

      - name: Install Heartbeat dependencies
        working-directory: Heartbeat
        run: bun install --frozen-lockfile || bun install

      - name: Validate agent definitions exist
        run: |
          count=$(ls agents/*.md 2>/dev/null | wc -l | tr -d ' ')
          echo "Found $count agent definitions"
          if [ "$count" -lt 1 ]; then
            echo "ERROR: No agent definitions found in agents/"
            exit 1
          fi

      - name: Scan for credential patterns
        run: |
          echo "Scanning for potential credentials in source files..."
          found=0
          if grep -r --include="*.ts" --include="*.js" --include="*.json" \
               -E "sk-ant-[a-zA-Z0-9\-]+" \
               --exclude-dir=node_modules . 2>/dev/null; then
            echo "WARNING: Possible Anthropic API key pattern found"
            found=1
          fi
          if grep -r --include="*.ts" --include="*.js" \
               -E "ANTHROPIC_API_KEY\s*=\s*['\"][^'\"]{10}" \
               --exclude-dir=node_modules . 2>/dev/null; then
            echo "WARNING: Hardcoded ANTHROPIC_API_KEY assignment found"
            found=1
          fi
          if grep -r --include="*.ts" --include="*.js" --include="*.json" \
               -E "bot[0-9]{9,}:[A-Za-z0-9_\-]{35}" \
               --exclude-dir=node_modules . 2>/dev/null; then
            echo "WARNING: Possible Telegram bot token found"
            found=1
          fi
          if [ "$found" -eq 1 ]; then
            echo "Credential scan failed — review findings above"
            exit 1
          fi
          echo "Credential scan passed — no patterns detected"
